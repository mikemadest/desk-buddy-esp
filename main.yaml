esphome:
  name: esphome-web-e4da60
  friendly_name: Prototype-s3
  min_version: 2026.4.0
  name_add_mac_suffix: false
  includes:
    - src/buddy_states.h
    - src/buddy_faces.h
    - src/buddy_faces.cpp

  on_boot:
    priority: 15.0
    then:
      - text_sensor.template.publish:
          id: current_emotion
          state: "IDLE"
      - lambda: 'id(last_interaction_ms) = millis();'
      - script.execute: apply_mood_light

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: WARN
  logs:
    mpu6050: ERROR
    sensor: WARN

api:
  encryption:
    key: !secret esphome_web_e4da60__encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: "Wi-Fi connected, syncing Home Assistant time..."
      - component.update: home_assistant_time

# Shared I2C bus: SSD1306 OLED + MPU6050
i2c:
  sda: GPIO4
  scl: GPIO5
  scan: false
  frequency: 100kHz

time:
  - platform: homeassistant
    id: home_assistant_time
    timezone: "Europe/Amsterdam"
    on_time_sync:
      then:
        - lambda: |-
            // Reset idle timer on clock sync to prevent immediate "Lonely" state on reboot/sync
            id(last_interaction_ms) = millis();

# Passive buzzer on GPIO6 — RTTTL plays melodies via LEDC PWM
output:
  - platform: ledc
    pin: GPIO6
    id: buzzer_pwm
    min_power: 0.0
    max_power: 0.10

rtttl:
  output: buzzer_pwm
  id: robot_audio

light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: RGB
    pin: GPIO21
    num_leds: 1
    name: "Companion Status Light"
    id: onboard_neopixel
    default_transition_length: 0s

text_sensor:
  - platform: template
    id: current_emotion
    name: "Buddy Current Emotion"
    update_interval: never
    lambda: |-
      const char *label = buddy_emotion_label(id(current_state));
      if (label == nullptr) return {id(current_emotion).state.c_str()};
      return {label};

sensor:
  - platform: template
    name: "Buddy Happiness Level"
    id: happiness_sensor
    icon: "mdi:heart"
    unit_of_measurement: "lvl"
    accuracy_decimals: 0
    lambda: |-
      return id(happiness_level);
    update_interval: 1s

  - platform: homeassistant
    id: current_temperature
    entity_id: sensor.presence_sensor_entrance_device_temperature

  - platform: homeassistant
    id: room_humidity
    entity_id: sensor.ikea_vindstyrka_air_monitor_1_humidity

  - platform: mpu6050
    address: 0x68
    update_interval: 100ms

    # X/Y: lateral shakes. Z: lift/drop via delta-from-previous (not absolute — avoids gravity).
    accel_x:
      id: accel_x
      internal: true
      filters:
        - delta: 3.0
      on_value_range:
        - above: 4.5
          then:
            - if:
                condition:
                  lambda: 'return !id(motion_busy) && !id(hud_active) && !id(face_gallery_active);'
                then:
                  - script.execute:
                      id: handle_shake
                      intensity: !lambda 'return fabsf(x);'

    accel_y:
      id: accel_y
      internal: true
      filters:
        - delta: 3.0
      on_value_range:
        - below: -4.5
          then:
            - if:
                condition:
                  lambda: 'return !id(motion_busy) && !id(hud_active) && !id(face_gallery_active);'
                then:
                  - script.execute:
                      id: handle_shake
                      intensity: !lambda 'return fabsf(x);'
        - above: 4.5
          then:
            - if:
                condition:
                  lambda: 'return !id(motion_busy) && !id(hud_active) && !id(face_gallery_active);'
                then:
                  - script.execute:
                      id: handle_shake
                      intensity: !lambda 'return fabsf(x);'

    accel_z:
      id: accel_z
      internal: true
      filters:
        # Convert absolute Z (incl. gravity) into |change| so lift/drop is detectable
        - lambda: |-
            static float prev = x;
            float d = fabsf(x - prev);
            prev = x;
            return d;
      on_value_range:
        - above: 2.2
          then:
            - if:
                condition:
                  lambda: 'return !id(motion_busy) && !id(hud_active) && !id(face_gallery_active);'
                then:
                  - script.execute:
                      id: handle_shake
                      intensity: !lambda 'return x + 5.0f;'  # lift/drop → curious/surprised band


switch:
  - platform: gpio
    pin: GPIO7
    id: vib_motor
    name: "Vibration Actuator"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLDOWN
    name: "Head Touch Sensor"
    filters:
      - delayed_on_off: 40ms
    # multi_click replaces on_click so single/triple/long don't fight each other
    on_multi_click:
      # Triple click — enter/exit face gallery (review all expressions)
      - timing:
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at most 400ms
          - ON for at most 400ms
          - OFF for at least 200ms
        then:
          - lambda: |-
              id(face_gallery_active) = !id(face_gallery_active);
              id(hud_active) = false;
              if (id(face_gallery_active)) id(face_gallery_index) = 0;
              id(last_interaction_ms) = millis();
          - rtttl.play: "gallery:d=32,o=6,b=220:c,e,g"

      # Single short tap — next gallery face, or pet in normal mode
      - timing:
          - ON for at most 400ms
          - OFF for at least 250ms
        then:
          - if:
              condition:
                lambda: 'return id(face_gallery_active);'
              then:
                - lambda: |-
                    id(face_gallery_index) = (id(face_gallery_index) + 1) % buddy_gallery_count();
                    id(last_interaction_ms) = millis();
                - rtttl.play: "tick:d=32,o=7,b=300:c"
              else:
                - if:
                    condition:
                      lambda: 'return !id(motion_busy) && !id(hud_active) && !id(face_gallery_active);'
                    then:
                      - script.execute: handle_head_pet

      # Long hold — exit gallery, or toggle status HUD
      - timing:
          - ON for at least 500ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: 'return id(face_gallery_active);'
              then:
                - lambda: |-
                    id(face_gallery_active) = false;
                    id(last_interaction_ms) = millis();
                - rtttl.play: "gallery:d=32,o=5,b=200:g,e,c"
              else:
                - if:
                    condition:
                      lambda: 'return !id(motion_busy);'
                    then:
                      - lambda: 'id(hud_active) = !id(hud_active);'
                      - rtttl.play: "hud_toggle:d=32,o=6,b=200:g,c"
                      - lambda: 'id(last_interaction_ms) = millis();'

interval:
  # Periodic life tick — random idle animations and lonely mode checks
  - interval: 35s
    then:
      - script.execute: life_tick

# Face/emotion constants live in src/buddy_states.h (compile-time enums).
# Drawing + face selection live in src/buddy_faces.h/.cpp.
globals:
  # --- State Management Variables ---
  - id: current_state
    type: int
    initial_value: '0'  # STATE_IDLE

  # Blocks motion reactions while a shake animation is running (not used for pets)
  - id: motion_busy
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: hud_active
    type: bool
    initial_value: 'false'
  # 0 = neutral, 1 = smile, 2 = happy, 3 = heart eyes (caps at 3)
  - id: happiness_level
    type: int
    initial_value: '0'
  - id: last_interaction_ms
    type: unsigned long
    initial_value: '0'
  - id: random_event_id
    type: int
    initial_value: '-1'  # STATE_NONE sentinel — no active event
  - id: random_event_end_ms
    type: unsigned long
    initial_value: '0'
  - id: mouth_talking
    type: bool
    initial_value: 'false'
  - id: lonely_mode
    type: bool
    initial_value: 'false'
  - id: face_gallery_active
    type: bool
    initial_value: 'false'
  - id: face_gallery_index
    type: int
    initial_value: '0'
  - id: dizzy_severe
    type: bool
    initial_value: 'false'
  - id: dizzy_started_ms
    type: unsigned long
    initial_value: '0'

# --- Main Scripts ---
script:
  - id: handle_shake
    mode: single
    parameters:
      intensity: float
    then:
      - lambda: |-
          uint32_t idle_ms = millis() - id(last_interaction_ms);
          if (idle_ms < 2500) return; // Cooldown — avoid rapid retriggers
          id(last_interaction_ms) = millis();
      - script.execute:
          id: handle_motion
          intensity: !lambda 'return intensity;'

  - id: apply_mood_light
    then:
      - lambda: |-
          auto call = id(onboard_neopixel).turn_on();
          switch (id(happiness_level)) {
            case 3:
              call.set_brightness(0.55);
              call.set_rgb(1.0, 0.15, 0.55);
              break;
            case 2:
              call.set_brightness(0.45);
              call.set_rgb(0.80, 0.28, 0.50);
              break;
            case 1:
              call.set_brightness(0.38);
              call.set_rgb(0.55, 0.42, 0.38);
              break;
            default:
              call.set_brightness(0.3);
              call.set_rgb(0.0, 0.5, 1.0);
              break;
          }
          call.perform();

  - id: handle_head_pet
    mode: restart
    then:
      - lambda: |-
          id(current_state) = STATE_IDLE;
          id(last_interaction_ms) = millis();
          id(lonely_mode) = false;
          if (id(happiness_level) < 3) {
            id(happiness_level)++;
          }
          switch (id(happiness_level)) {
            case 1:
               id(current_state) = STATE_SMILE; // happiness=1 → smile face
              id(robot_audio).play("tap1:d=32,o=6,b=200:c,e");
              break;
            case 2:
               id(current_state) = STATE_HAPPY; // happiness=2 → happy face
              id(robot_audio).play("tap2:d=32,o=6,b=240:c,e,g");
              break;
            default:
              id(current_state) = STATE_HEART_EYES; // happiness=3 → heart eyes
              id(robot_audio).play("tap3:d=32,o=6,b=280:c,e,g,c7,e7");
              break;
          }
      - script.execute: mouth_talk_pet
      - light.turn_on:
          id: onboard_neopixel
          brightness: 85%
          red: 1.0
          green: 0.25
          blue: 0.55
      - switch.turn_on: vib_motor
      - delay: 100ms
      - switch.turn_off: vib_motor
      - script.execute: clear_pet_emotion
      - script.execute: happiness_decay

  - id: clear_pet_emotion
    mode: restart
    then:
      - delay: 2.5s
      - lambda: 'id(current_state) = STATE_IDLE;' # Reset to neutral/idle
      - script.execute: apply_mood_light

  - id: happiness_decay
    mode: restart
    then:
      - lambda: 'id(last_interaction_ms) = millis();'
      - delay: 5s
      - while:
          condition:
            lambda: 'return id(happiness_level) > 0;'
          then:
            - lambda: 'id(happiness_level)--;'
            - script.execute: apply_mood_light
            - delay: 3s

  - id: handle_motion
    mode: single
    parameters:
      intensity: float
    then:
      - lambda: |-
          id(current_state) = STATE_IDLE;
          id(motion_busy) = true;
          id(last_interaction_ms) = millis();
          id(lonely_mode) = false;

          // Curious < surprised < dizzy (@@ then XX if severe)
          if (intensity >= 9.0) {
            id(dizzy_severe) = (intensity >= 11.0);
            id(dizzy_started_ms) = millis();
            id(current_state) = STATE_DIZZY;
            id(robot_audio).play("dizzy:d=16,o=5,b=200:g,f,e,d,c");
          } else if (intensity >= 7.0) {
            id(current_state) = STATE_SURPRISED;
            id(robot_audio).play("surprise:d=16,o=6,b=240:g,g");
          } else {
            id(current_state) = STATE_WORKING;
            id(robot_audio).play("peek:d=16,o=6,b=300:e,e");
          }
      - script.execute: mouth_talk_motion
      - light.turn_on:
          id: onboard_neopixel
          brightness: 80%
          red: 0.5
          green: 0.5
          blue: 0.0
      - switch.turn_on: vib_motor
      - delay: 150ms
      - switch.turn_off: vib_motor
      - delay: 3s
      - lambda: |-
          id(current_state) = STATE_IDLE;
          id(motion_busy) = false;
          id(dizzy_severe) = false;
      - script.execute: apply_mood_light

  - id: mouth_talk_pet
    mode: restart
    then:
      - lambda: 'id(mouth_talking) = true;'
      - delay: 900ms
      - lambda: 'id(mouth_talking) = false;'

  - id: mouth_talk_motion
    mode: restart
    then:
      - lambda: 'id(mouth_talking) = true;'
      - delay: 1200ms
      - lambda: 'id(mouth_talking) = false;'

  - id: random_chirp
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(current_state) == STATE_IDLE && !id(motion_busy);'
          then:
            - lambda: |-
                id(mouth_talking) = true;
                id(robot_audio).play("idle:d=32,o=7,b=320:e,c");
            - delay: 350ms
            - lambda: 'id(mouth_talking) = false;'

  - id: life_tick
    then:
      - if:
          condition:
            lambda: |-
              return id(current_state) == STATE_IDLE && !id(motion_busy)
                && !id(hud_active) && !id(face_gallery_active)
                && id(random_event_id) == STATE_NONE;
          then:
            - lambda: |-
                uint32_t idle_ms = millis() - id(last_interaction_ms);

                // Pick a trigger chance from the table (first entry where threshold <= idle)
                struct { int64_t ms; uint8_t chance; } TABLE[] = {
                  { 0,      0 },   // fresh — no event
                  { 60000,  5 },  // < 1 min: rare (5%)
                  { 300000, 14 }, // 1-5 min: occasional chirp (14%)
                  { 900000, 28 }, // 5-15 min: moderate interest (28%)
                  { 1800000,45 }, // 30+ min: lonely mode (45%)
                };
                int pick = -1;
                for (int i = 0; i < 5; i++) {
                  if (idle_ms >= TABLE[i].ms) pick = i;
                }
                // Enter lonely mode after 30+ min idle (table index 4), even if no event fires
                if (pick >= 4) id(lonely_mode) = true;
                if (pick < 0 || (random() % 100) >= TABLE[pick].chance) return;

                // Pick event index: early idle favors calm events, later unlocks all
                int evt_max = (pick >= 3) ? 8 : 6; // calm events only before 15 min
                int evt = random() % evt_max;
                // Lonely: usually beg for attention (thumbs-up); if mood is 0, sometimes cry
                if (id(lonely_mode)) {
                  if (id(happiness_level) <= 0 && (random() % 100) < 40)
                    evt = 5; // SAD_MAPLE / cry waterfall
                  else if ((random() % 100) < 60)
                    evt = 7; // thumbs-up
                }

                id(random_event_id) = evt;
                // Yawn needs the full open/hold/close cycle (~4s)
                if (evt == 3)
                  id(random_event_end_ms) = millis() + 4200;
                else
                  id(random_event_end_ms) = millis() + 2000 + (random() % 800);
            - if:
                condition:
                  lambda: 'return id(random_event_id) == 5 || id(random_event_id) == 7;'
                then:
                  - script.execute: random_chirp

font:
  # Only glyphs used by the status HUD (skip default GF_Latin_Kernel)
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
    glyphsets: []
    glyphs:
      # HUD + face-gallery labels (unique codepoints only)
      - " -%./0123456789:ABCDEFHIKLMNOPRSTUWXYdeimopt"

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 200ms
    lambda: |-
      if (id(hud_active) && !id(face_gallery_active)) {
        it.print(64, 0, id(font_small), TextAlign::TOP_CENTER, "--- STATUS HUD ---");
        it.strftime(0, 18, id(font_small), "Time: %H:%M", id(home_assistant_time).now());
        it.printf(0, 34, id(font_small), "Mood: %d/3", id(happiness_level));
        if (id(current_temperature).has_state() && id(room_humidity).has_state()) {
          it.printf(0, 50, id(font_small), "%dC  %d%%",
                    (int) id(current_temperature).state, (int) id(room_humidity).state);
        } else if (id(current_temperature).has_state()) {
          it.printf(0, 50, id(font_small), "Temp: %d C", (int) id(current_temperature).state);
        }
        return;
      }

      const uint32_t ms = millis();
      int face;

      bool dsev = id(dizzy_severe);
      uint32_t dstart = id(dizzy_started_ms);

      if (id(face_gallery_active)) {
        face = buddy_gallery_face(id(face_gallery_index));
        it.printf(0, 0, id(font_small), "%d/%d %s",
                  id(face_gallery_index) + 1, buddy_gallery_count(),
                  buddy_gallery_label(id(face_gallery_index)));
      } else {
        buddy_expire_random_event(id(random_event_id), id(random_event_end_ms), ms);
        const bool has_temp = id(current_temperature).has_state();
        const float temp_c = has_temp ? id(current_temperature).state : 0.0f;
        const int target = buddy_select_face(
            id(current_state), id(happiness_level), id(random_event_id),
            id(random_event_end_ms), ms, id(home_assistant_time).now().hour,
            has_temp, temp_c);
        face = buddy_present_face(target, ms);
      }

      buddy_draw_face(it, face, ms, id(mouth_talking), dsev, dstart);
